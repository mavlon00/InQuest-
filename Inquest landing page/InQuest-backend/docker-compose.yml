version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: inquest_postgres
    environment:
      POSTGRES_USER: inquest_user
      POSTGRES_PASSWORD: inquest_password
      POSTGRES_DB: inquest_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U inquest_user -d inquest_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inquest_network

  # Redis for caching and Celery
  redis:
    image: redis:7-alpine
    container_name: inquest_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - inquest_network

  # Mosquitto MQTT Broker
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: inquest_mosquitto
    ports:
      - "1883:1883"
      - "9001:9001"
    volumes:
      - mosquitto_data:/mosquitto/data
      - mosquitto_logs:/mosquitto/log
    networks:
      - inquest_network

  # InQuest Backend API
  backend:
    build: .
    container_name: inquest_backend
    environment:
      DATABASE_URL: postgresql+asyncpg://inquest_user:inquest_password@postgres:5432/inquest_db
      REDIS_URL: redis://redis:6379/0
      MQTT_BROKER: mosquitto
      DEBUG: "True"
      ENVIRONMENT: development
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
    networks:
      - inquest_network
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  postgres_data:
  redis_data:
  mosquitto_data:
  mosquitto_logs:

networks:
  inquest_network:
    driver: bridge
